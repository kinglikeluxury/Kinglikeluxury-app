<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Kinglike Luxury - Exclusive Properties</title>
    <meta name="description" content="Kinglike Luxury - Find your perfect property - exclusive apartments, villas, lands, and construction projects" />
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3bcac4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kinglike" />
    <link rel="apple-touch-icon" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS: hide vite-error-overlay for blank/unknown HMR errors in Replit -->
    <style>
      vite-error-overlay { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Intercept WebSocket so Vite never receives the blank HMR error event
      (function () {
        var _WS = window.WebSocket;
        window.WebSocket = function (url, protocols) {
          var ws = protocols ? new _WS(url, protocols) : new _WS(url);
          ws.addEventListener('message', function (e) {
            try {
              var data = JSON.parse(e.data);
              // Drop Vite error events that have no useful message
              if (data && data.type === 'error' && (!data.err || !data.err.message)) {
                Object.defineProperty(e, 'defaultPrevented', { value: true });
                e.stopImmediatePropagation();
              }
            } catch (_) {}
          }, true);
          return ws;
        };
        window.WebSocket.prototype = _WS.prototype;
        Object.keys(_WS).forEach(function(k){ window.WebSocket[k] = _WS[k]; });

        // Also swallow empty window.onerror events
        window.addEventListener('error', function (e) {
          if (!e.message && !e.filename && !e.error) e.stopImmediatePropagation();
        }, true);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
