<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Kinglike Luxury - Exclusive Properties</title>
    <meta name="description" content="Kinglike Luxury - Find your perfect property - exclusive apartments, villas, lands, and construction projects" />
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3bcac4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kinglike" />
    <link rel="apple-touch-icon" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Suppress Vite "unknown runtime error" overlay (empty HMR errors from Replit)
      (function() {
        // 1. MutationObserver: immediately remove any vite-error-overlay with no real message
        function removeBlankViteOverlay(node) {
          if (!node || node.nodeName.toLowerCase() !== 'vite-error-overlay') return;
          // Remove synchronously first (covers no-shadowRoot case)
          try {
            var root = node.shadowRoot;
            if (!root) { node.remove(); return; }
            var msgEl = root.querySelector('.message-body');
            var msg = msgEl ? msgEl.textContent.trim() : '';
            if (!msg || msg === 'unknown runtime error') node.remove();
          } catch(e) { node.remove(); }
        }
        var obs = new MutationObserver(function(mutations) {
          mutations.forEach(function(m) {
            m.addedNodes.forEach(removeBlankViteOverlay);
          });
        });
        obs.observe(document.documentElement, { childList: true, subtree: true });
        // Also sweep any overlay already in the DOM on load
        document.addEventListener('DOMContentLoaded', function() {
          document.querySelectorAll('vite-error-overlay').forEach(removeBlankViteOverlay);
        });

        // 2. Intercept window.onerror — cancel empty errors before Vite sees them
        var _origOnerror = window.onerror;
        window.onerror = function(msg, src, line, col, err) {
          if (!msg && !err) return true; // swallow empty
          if (typeof msg === 'string' && msg.trim() === '') return true;
          if (_origOnerror) return _origOnerror.apply(this, arguments);
        };

        // 3. Wrap addEventListener to skip empty error events
        var _orig = window.addEventListener.bind(window);
        window.addEventListener = function(type, listener, options) {
          if (type === 'error') {
            var wrapped = function(e) {
              if (!e || (!e.message && !e.filename && e.error == null)) return;
              return listener.call(this, e);
            };
            return _orig(type, wrapped, options);
          }
          return _orig(type, listener, options);
        };
      })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
