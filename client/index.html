    <meta charset="UTF-8" />

    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Suppress Replit HMR WebSocket "unknown runtime error" overlay
      (function() {
        var _origAddEventListener = window.addEventListener.bind(window);
        window.addEventListener = function(type, listener, options) {
          if (type === 'error') {
            var wrapped = function(event) {
              if (!event || (!event.message && !event.filename && event.error == null)) return;
              return listener.call(this, event);
            };
            return _origAddEventListener(type, wrapped, options);
          }
          return _origAddEventListener(type, listener, options);
        };
      })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
